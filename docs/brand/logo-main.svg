<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="1" />
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" stop-opacity="1" />
      <stop offset="100%" stop-color="#111827" stop-opacity="1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Original rectangles -->
  <rect x="20" y="30" width="50" height="50" rx="12" fill="url(#grad1)" transform="rotate(-5, 45, 55)" filter="url(#shadow)"/>
  <rect x="30" y="35" width="50" height="50" rx="12" fill="url(#grad2)" transform="rotate(3, 55, 60)" opacity="0.9" filter="url(#shadow)"/>
  <rect x="40" y="25" width="50" height="50" rx="12" fill="url(#grad1)" transform="rotate(-2, 65, 50)" opacity="0.7" filter="url(#shadow)"/>
  <!-- "main" badge -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="30" height="15" rx="7" fill="#1F2937" opacity="0.8" />
    <text x="15" y="11" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">main</text>
  </g>
</svg>