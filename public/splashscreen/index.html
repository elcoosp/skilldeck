<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillDeck splash animation</title>
    <!-- Poppins Bold for the wordmark -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0C14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* splash container – square, deep neutral background with subtle radial gradient */
        .splash {
            width: 400px;
            height: 400px;
            background: #0F172A;
            background-image: radial-gradient(circle at 30% 40%, #1E293B 0%, #0F172A 90%);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;   /* so sliding cards are hidden until they enter */
        }

        /* all three cards share common styling */
        .card {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 24px;    /* rx=12 in 100x100 viewBox, scaled */
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            will-change: transform, opacity;
        }

        /* primary card – gradient blue */
        .card-primary {
            background: linear-gradient(145deg, #3B82F6, #1E40AF);
            /* final position & rotation from logo: translate(20px,30px) rotate(-5deg) in 100x100 viewBox,
               scaled to 400x400: multiply by 4 => (80,120) but we'll use percentages for flexibility */
            transform-origin: center center;
        }

        /* secondary card – dark neutral */
        .card-secondary {
            background: linear-gradient(145deg, #1F2937, #111827);
            opacity: 0.9;
        }

        /* third card – semi‑transparent blue */
        .card-third {
            background: #3B82F6;
            opacity: 0.7;
        }

        /* final positions (based on brand logo scaled to 400px) */
        .card-primary.final {
            transform: translate(80px, 120px) rotate(-5deg);
        }
        .card-secondary.final {
            transform: translate(120px, 140px) rotate(3deg);
        }
        .card-third.final {
            transform: translate(160px, 100px) rotate(-2deg);
        }

        /* animation keyframes */
        @keyframes slidePrimary {
            0% { transform: translate(-200px, -200px) rotate(0deg); opacity: 0.2; }
            40% { transform: translate(70px, 110px) rotate(-8deg); opacity: 1; }
            60% { transform: translate(85px, 125px) rotate(-4deg); }  /* overshoot */
            100% { transform: translate(80px, 120px) rotate(-5deg); }
        }

        @keyframes slideSecondary {
            0% { transform: translate(300px, 300px) rotate(0deg); opacity: 0.2; }
            40% { transform: translate(130px, 150px) rotate(5deg); opacity: 1; }
            60% { transform: translate(115px, 135px) rotate(2deg); }  /* overshoot */
            100% { transform: translate(120px, 140px) rotate(3deg); }
        }

        @keyframes slideThird {
            0% { transform: translate(300px, -200px) rotate(0deg); opacity: 0.2; }
            40% { transform: translate(170px, 90px) rotate(-4deg); opacity: 0.7; }
            60% { transform: translate(155px, 105px) rotate(-1deg); }  /* overshoot */
            100% { transform: translate(160px, 100px) rotate(-2deg); }
        }

        /* apply animations with delays to simulate stage 1 & 2 */
        .card-primary {
            animation: slidePrimary 1.2s ease-in-out forwards;
        }
        .card-secondary {
            animation: slideSecondary 1.2s ease-in-out forwards;
        }
        .card-third {
            animation: slideThird 1.2s ease-in-out forwards;
        }

        /* wordmark "SkillDeck" – hidden initially, fades in at 1.2s */
        .wordmark {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 40px;
            letter-spacing: 1px;
            color: white;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1.2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* sparkle on top rectangle (primary) – appears briefly at 1.2s */
        .sparkle {
            position: absolute;
            top: 100px;
            left: 160px;
            width: 30px;
            height: 30px;
            opacity: 0;
            animation: sparkleFlash 0.5s ease-out 1.3s forwards;
            pointer-events: none;
        }

        .sparkle::before,
        .sparkle::after {
            content: '';
            position: absolute;
            background: white;
            box-shadow: 0 0 16px #FFD966;
        }
        .sparkle::before {
            width: 3px;
            height: 18px;
            left: 13px;
            top: 6px;
            border-radius: 2px;
        }
        .sparkle::after {
            width: 18px;
            height: 3px;
            left: 6px;
            top: 13px;
            border-radius: 2px;
        }

        @keyframes sparkleFlash {
            0% { opacity: 0; transform: scale(0.2); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); }
        }

        /* progress line at bottom */
        .progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 0%;
            background: #FF8A4C;  /* accent orange */
            border-radius: 0 2px 2px 0;
            animation: fillProgress 2s linear forwards;
        }

        @keyframes fillProgress {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* trailing shadows – already present via box‑shadow, but we can enhance with extra blur */
        /* the keyframes already move the cards, so shadows move naturally */
    </style>
</head>
<body>
    <div class="splash">
        <!-- three cards (no extra markup, they are positioned via animations) -->
        <div class="card card-primary"></div>
        <div class="card card-secondary"></div>
        <div class="card card-third"></div>

        <!-- sparkle element (appears on primary card) -->
        <div class="sparkle"></div>

        <!-- wordmark -->
        <div class="wordmark">SkillDeck</div>

        <!-- progress line -->
        <div class="progress"></div>
    </div>
</body>
</html>
