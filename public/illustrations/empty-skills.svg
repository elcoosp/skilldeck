<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient for primary floating card -->
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Subtle grid pattern for museum wall background -->
    <pattern id="wallGrid" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M 0 0 L 8 0 M 0 0 L 0 8" stroke="#CBD5E1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Clean white background with faint grid -->
  <rect width="100" height="100" fill="white"/>
  <rect width="100" height="100" fill="url(#wallGrid)"/>

  <!-- 2×2 grid of empty dashed frames (shelves) -->
  <!-- Top-left frame -->
  <rect x="12" y="12" width="30" height="30" rx="12" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 3" opacity="0.4"/>
  <!-- Top-right frame (destination with sparkle) -->
  <rect x="58" y="12" width="30" height="30" rx="12" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 3" opacity="0.4"/>
  <!-- Bottom-left frame -->
  <rect x="12" y="58" width="30" height="30" rx="12" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 3" opacity="0.4"/>
  <!-- Bottom-right frame -->
  <rect x="58" y="58" width="30" height="30" rx="12" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 3" opacity="0.4"/>

  <!-- Motion trail / glow lines (subtle, behind the floating cards) -->
  <path d="M28 70 Q 45 55, 68 30" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M32 74 Q 48 58, 70 34" stroke="#1F2937" stroke-width="2" fill="none" opacity="0.1" stroke-linecap="round"/>
  <path d="M36 78 Q 52 62, 72 38" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.1" stroke-linecap="round"/>

  <!-- Floating cards (foreground, moving toward top-right frame) -->
  <!-- Dark neutral card (#1F2937) trailing, rotated +3° -->
  <rect x="20" y="65" width="26" height="26" rx="12" fill="#1F2937" transform="rotate(3, 33, 78)" opacity="0.9"/>
  <!-- Semi-transparent blue card (#3B82F6 at 0.5) following, rotated -2° -->
  <rect x="24" y="68" width="26" height="26" rx="12" fill="#3B82F6" transform="rotate(-2, 37, 81)" opacity="0.5"/>
  <!-- Primary gradient blue card mid‑transit, rotated -5° (front) -->
  <rect x="15" y="60" width="26" height="26" rx="12" fill="url(#gradBlue)" transform="rotate(-5, 28, 73)"/>

  <!-- Faint sparkle above the top‑right frame (accent orange) -->
  <circle cx="73" cy="10" r="1.5" fill="#F97316" opacity="0.6"/>
  <path d="M73 6 L73 14 M69 10 L77 10" stroke="#F97316" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <circle cx="73" cy="10" r="0.8" fill="white" opacity="0.8"/>
</svg>
