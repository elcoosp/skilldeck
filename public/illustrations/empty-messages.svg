<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- faint background card (overlap echo) -->
  <rect x="28" y="35" width="50" height="50" rx="12" fill="url(#grad1)" transform="rotate(3, 53, 60)" opacity="0.15" filter="url(#shadow)"/>
  <!-- main card -->
  <rect x="20" y="30" width="50" height="50" rx="12" fill="url(#grad1)" transform="rotate(-5, 45, 55)" filter="url(#shadow)"/>
  <!-- chat bubble – centered within the card, shifted left -->
  <path d="M34 48 L58 48 Q62 48 62 52 L62 60 Q62 64 58 64 L50 64 L45 68 L45 64 L34 64 Q30 64 30 60 L30 52 Q30 48 34 48 Z" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- three dots, centered -->
  <circle cx="40" cy="56" r="1.5" fill="white"/>
  <circle cx="46" cy="56" r="1.5" fill="white"/>
  <circle cx="52" cy="56" r="1.5" fill="white"/>
</svg>
