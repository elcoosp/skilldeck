<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <!-- Extremely subtle felt‑like grid texture -->
    <pattern id="felt" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(0)">
      <line x1="0" y1="0" x2="12" y2="0" stroke="#9CA3AF" stroke-width="0.4" opacity="0.06"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="#9CA3AF" stroke-width="0.4" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Warm neutral background -->
  <rect width="100" height="100" fill="#F9FAFB"/>
  <!-- Faint texture overlay -->
  <rect width="100" height="100" fill="url(#felt)"/>

  <!-- Secondary rectangle: dark neutral, +3°, slightly transparent (peeks from behind) -->
  <rect x="30" y="35" width="50" height="50" rx="12" fill="url(#grad2)" transform="rotate(3, 55, 60)" opacity="0.9" filter="url(#shadow)"/>

  <!-- Third rectangle: lighter blue, -2°, sliding in from top‑right -->
  <rect x="40" y="25" width="50" height="50" rx="12" fill="url(#grad1)" transform="rotate(-2, 65, 50)" opacity="0.7" filter="url(#shadow)"/>

  <!-- Primary rectangle: gradient blue, -5°, fully opaque (front) -->
  <rect x="20" y="30" width="50" height="50" rx="12" fill="url(#grad1)" transform="rotate(-5, 45, 55)" filter="url(#shadow)"/>

  <!-- Single shimmer / sparkle suggesting possibility -->
  <circle cx="67" cy="18" r="3" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.9" filter="url(#shadow)"/>
  <path d="M67 13 L67 23 M62 18 L72 18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
</svg>
