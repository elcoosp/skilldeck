<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Primary gradient for the server -->
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Glow for ports (radial gradient) -->
    <radialGradient id="portGlow" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle grid pattern (museum wall) -->
    <pattern id="grid" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0 0 L8 0 M0 0 L0 8" stroke="#94A3B8" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <!-- Soft drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#1E293B" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="white"/>
  <rect width="100" height="100" fill="url(#grid)"/>

  <!-- Main server (blue gradient) – sleek and centered -->
  <rect x="32" y="22" width="44" height="52" rx="12" fill="url(#serverGrad)" filter="url(#shadow)"/>

  <!-- Glow behind the two ports (soft circles) -->
  <circle cx="76" cy="36" r="7" fill="url(#portGlow)" opacity="0.8"/>
  <circle cx="76" cy="58" r="7" fill="url(#portGlow)" opacity="0.8"/>

  <!-- Empty port outlines (just the rings) -->
  <circle cx="76" cy="36" r="4.5" fill="none" stroke="#1F2937" stroke-width="1.8" stroke-opacity="0.7"/>
  <circle cx="76" cy="58" r="4.5" fill="none" stroke="#1F2937" stroke-width="1.8" stroke-opacity="0.7"/>

  <!-- Floating card 1 (dark neutral) – rotated slightly, positioned top‑left -->
  <rect x="10" y="12" width="21" height="21" rx="8" fill="#1F2937" transform="rotate(-4, 20, 22)" filter="url(#shadow)"/>

  <!-- Floating card 2 (semi‑transparent blue) – rotated, positioned bottom‑left -->
  <rect x="8" y="60" width="21" height="21" rx="8" fill="#3B82F6" fill-opacity="0.5" transform="rotate(5, 18, 70)" filter="url(#shadow)"/>

  <!-- Cables – dotted lines with a gentle curve (like loosely hanging) -->
  <!-- Cable from top card to top port -->
  <path d="M31 22 Q 48 28, 71 33" stroke="#1F2937" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.7"/>
  <!-- Cable from bottom card to bottom port -->
  <path d="M29 71 Q 48 61, 71 55" stroke="#1F2937" stroke-width="1.5" stroke-dasharray="4 3" fill="none" opacity="0.7"/>

  <!-- Plugs – tiny orange circles hovering just above each port -->
  <circle cx="71" cy="33" r="2.8" fill="#F97316" filter="url(#shadow)"/>
  <circle cx="71" cy="55" r="2.8" fill="#F97316" filter="url(#shadow)"/>

  <!-- Subtle extra sparkle (tiny) on the server to suggest readiness – optional -->
  <circle cx="48" cy="35" r="1.5" fill="white" opacity="0.6" filter="url(#shadow)"/>
</svg>
