<!DOCTYPE html>
<html lang="en" style="background-color: #0F172A; margin: 0; padding: 0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillDeck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background-color: #0F172A !important;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* fixed-size container – perfectly centered, no rounded corners */
    .splash {
      width: 400px;
      height: 400px;
      background: #0F172A;
      background-image: radial-gradient(circle at 30% 40%, #1E293B 0%, #0F172A 90%);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
    }

    .card {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 48px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
      will-change: transform, opacity;
    }

    .card-primary {
      background: linear-gradient(145deg, #3B82F6, #1E40AF);
    }
    .card-secondary {
      background: linear-gradient(145deg, #1F2937, #111827);
      opacity: 0.9;
    }
    .card-third {
      background: #3B82F6;
      opacity: 0.7;
    }

    @keyframes slidePrimary {
      0% { transform: translate(-200px, -200px) rotate(0deg); opacity: 0.2; }
      40% { transform: translate(70px, 110px) rotate(-8deg); opacity: 1; }
      60% { transform: translate(85px, 125px) rotate(-4deg); }
      100% { transform: translate(80px, 120px) rotate(-5deg); }
    }
    @keyframes slideSecondary {
      0% { transform: translate(300px, 300px) rotate(0deg); opacity: 0.2; }
      40% { transform: translate(130px, 150px) rotate(5deg); opacity: 1; }
      60% { transform: translate(115px, 135px) rotate(2deg); }
      100% { transform: translate(120px, 140px) rotate(3deg); }
    }
    @keyframes slideThird {
      0% { transform: translate(300px, -200px) rotate(0deg); opacity: 0.2; }
      40% { transform: translate(170px, 90px) rotate(-4deg); opacity: 0.7; }
      60% { transform: translate(155px, 105px) rotate(-1deg); }
      100% { transform: translate(160px, 100px) rotate(-2deg); }
    }
    .card-primary { animation: slidePrimary 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .card-secondary { animation: slideSecondary 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .card-third { animation: slideThird 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    .wordmark {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 40px;
      letter-spacing: 1px;
      color: white;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6);
      position: absolute;
      bottom: 60px;
      left: 0;
      width: 100%;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1.2s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sparkle {
      position: absolute;
      top: 110px;
      left: 90px;
      width: 30px;
      height: 30px;
      opacity: 0;
      animation: sparkleFlash 0.5s ease-out 1.3s forwards;
      pointer-events: none;
      filter: drop-shadow(0 0 6px #FFD966);
    }
    .sparkle::before, .sparkle::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 2px;
    }
    .sparkle::before { width: 3px; height: 18px; left: 13px; top: 6px; }
    .sparkle::after { width: 18px; height: 3px; left: 6px; top: 13px; }
    @keyframes sparkleFlash {
      0% { opacity: 0; transform: scale(0.2); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(1); }
    }

    .progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      width: 0%;
      background: #FF8A4C;
      animation: fillProgress 2s linear forwards;
    }
    @keyframes fillProgress { from { width: 0%; } to { width: 100%; } }

    @media (prefers-reduced-motion) {
      .card-primary, .card-secondary, .card-third { animation: none !important; }
      .card-primary { transform: translate(80px, 120px) rotate(-5deg); }
      .card-secondary { transform: translate(120px, 140px) rotate(3deg); }
      .card-third { transform: translate(160px, 100px) rotate(-2deg); }
      .wordmark { opacity: 1; animation: none; }
      .progress { width: 100%; animation: none; }
    }
  </style>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        // Use the correct Tauri v2 API
        window.__TAURI__.event.emit('splashscreen-frontend-ready');
      }, 1500);
    });
  </script>
</head>
<body style="background-color: #0F172A; margin: 0; padding: 0;">
  <div class="splash">
    <div class="card card-primary"></div>
    <div class="card card-secondary"></div>
    <div class="card card-third"></div>
    <div class="sparkle"></div>
    <div class="wordmark">SkillDeck</div>
    <div class="progress"></div>
  </div>
</body>
</html>
