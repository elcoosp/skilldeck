name: Capture Marketing Assets

on:
  workflow_dispatch:
    inputs:
      workspace_path:
        description: 'Path to test workspace'
        required: true
        default: '/tmp/skilldeck-test-workspace'

jobs:
  capture:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri:build

      - name: Install Playwright browsers
        working-directory: marketing-assets
        run: pnpm exec playwright install chromium

      - name: Run marketing asset capture
        working-directory: marketing-assets
        env:
          CDP_ENDPOINT: http://localhost:9222
          TEST_WORKSPACE_PATH: ${{ github.event.inputs.workspace_path }}
        run: |
          # Start the built app in background with CDP enabled
          # (Implementation depends on OS; use appropriate binary path)
          pnpm capture

      - name: Upload screenshots and videos
        uses: actions/upload-artifact@v7
        with:
          name: marketing-assets-${{ matrix.os }}
          path: marketing-assets/test-results/
