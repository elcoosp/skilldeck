name: Docs CI

on:
  push:
    branches: [main]
    paths:
      - 'skilldeck-user-docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skilldeck-user-docs/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./skilldeck-user-docs

    steps:
      - uses: actions/checkout@v4

      # 1. Install pnpm using the official action – version auto-detected from packageManager field
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # no `with:` needed – reads version from package.json

      # 2. Now setup Node (pnpm is already in PATH)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: skilldeck-user-docs/pnpm-lock.yaml

      # 3. Get pnpm store path for caching (optional but speeds up installs)
      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint with Vale
        uses: errata-ai/vale-action@v2
        with:
          styles: |
            https://github.com/errata-ai/Microsoft/releases/latest/download/Microsoft.zip
            https://github.com/errata-ai/write-good/releases/latest/download/write-good.zip
          files: skilldeck-user-docs/src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdown lint
        run: pnpm exec markdownlint-cli2 "src/**/*.md" "src/**/*.mdx"

      - name: Build site
        run: pnpm run build

      - name: Check for broken links
        run: pnpm exec linkinator --recurse ./dist
