name: Docs CI
on:
  push:
    branches: [main]
    paths:
      - 'skilldeck-user-docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skilldeck-user-docs/**'
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./skilldeck-user-docs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          cache: true
          cache_dependency_path: skilldeck-user-docs/pnpm-lock.yaml

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint with Vale
        uses: errata-ai/vale-action@v2
        with:
          styles: |
            https://github.com/errata-ai/Microsoft/releases/latest/download/Microsoft.zip
            https://github.com/errata-ai/write-good/releases/latest/download/write-good.zip
          files: skilldeck-user-docs/src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdown lint
        run: pnpm exec markdownlint-cli2 "src/**/*.md" "src/**/*.mdx"

      - name: Build site
        run: pnpm run build

      - name: Check for broken links
        run: pnpm exec linkinator --recurse ./dist
