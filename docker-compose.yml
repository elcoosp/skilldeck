version: '3.8'

services:
  # ── SkillDeck Platform ─────────────────────────────────────────────────────
  skilldeck-platform:
    build:
      context: ./skilldeck-platform
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - DATABASE_URL=postgres://skilldeck:skilldeck_pass@db:5432/skilldeck
      - OLLAMA_HOST=http://ollama:11434
      - RUST_LOG=info,skilldeck_platform=debug
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skilldeck
      POSTGRES_PASSWORD: skilldeck_pass
      POSTGRES_DB: skilldeck
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skilldeck -d skilldeck']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Ollama (LLM enrichment) ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull the GLM model on first start.
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull glm4 || true &&
             wait"

  # ── Caddy reverse proxy (optional, for TLS termination) ──────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - skilldeck-platform
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config:
